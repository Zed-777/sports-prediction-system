constants:
  cache:
    base_duration: 7200
    cleanup_trigger: 50
    weather_ttl: 1800
  caps:
    humidity:
      max: 100.0
      min: 0.0
    precipitation:
      max: 50.0
      min: 0.0
    temperature:
      max: 45
      min: -10
    wind_speed:
      max: 60.0
      min: 0.0
  color_palette:
  - '#e74c3c'
  - '#f39c12'
  - '#f1c40f'
  - '#2ecc71'
  color_thresholds:
  - 25
  - 50
  - 75
  colors:
    gauge_bg: '#e9ecef'
    goals_bg: '#f39c12'
    header_bg: '#34495e'
    likely_away: '#e74c3c'
    likely_draw: '#636e72'
    likely_home: '#3498db'
    main_bg: '#fdfdfd'
    main_border: '#7f8c8d'
    perf_bg: '#3498db'
    results_bg: '#8e44ad'
    results_bg_edge: '#8e44ad'
    section_bg: '#f5f7fa'
    separator: '#d1d5db'
    shadow: '#000000'
    text_main: '#111111'
    underline: black
  confidence:
    cap: 0.92
    denominator: 125
    fallback_report_accuracy: 0.6
  enforce_caps: true
  gauge:
    inset_text_size: 16
    outer_radius: 0.48
    ring_width: 0.28
  injury:
    defense_penalty: 3
    max_reduction_pct: 25
    midfield_penalty: 5
    per_player_pct: 3.5
  layout:
    card_padding: 0.2
    figure_size:
    - 14
    - 18
    xlim:
    - 0
    - 10
    ylim:
    - 0
    - 20
  market_blend_weight: 0.2
  probability_caps:
    default:
      away_max: 85
      away_min: 5
      draw_max: 50
      draw_min: 5
      home_max: 85
      home_min: 5
    league_overrides:
      LL:
        away_max: 82
        away_min: 4
        draw_max: 48
        draw_min: 6
        home_max: 88
        home_min: 5
      PL:
        away_max: 88
        away_min: 3
        draw_max: 45
        draw_min: 5
        home_max: 87
        home_min: 5
      SA:
        away_max: 80
        away_min: 5
        draw_max: 52
        draw_min: 8
        home_max: 85
        home_min: 5
  provenance:
    record_clamps: true
  visual_defaults:
    font_main: DejaVu Sans
    footer_fontsize: 11
    header_fontsize: 24
    label_fontsize: 14
    section_title_fontsize: 18
    subtitle_fontsize: 16
    title_fontsize: 20
    value_fontsize: 23
  weather_defaults:
    fallback_humidity: 60
    fallback_precipitation: 0.0
    fallback_pressure: 1013
    fallback_temperature: 15.0
    fallback_visibility: 15
    fallback_wind_speed: 8
data_engineering:
  caching:
    enabled: true
    store: disk
    ttl_seconds: 3600
  fallbacks:
    order:
    - primary_api
    - secondary_api
    - backup_csv
  retry_policy:
    backoff_strategy: exponential
    jitter: true
    max_attempts: 5
data_sources:
  cache_ttl_by_endpoint:
    api-football-v1.p.rapidapi.com:
      /v3/fixtures: 3600
      /v3/injuries: 86400
      /v3/teams: 7200
    api.football-data.org:
      /v4/competitions/: 86400
      /v4/matches/: 3600
      /v4/teams/: 7200
    api.open-meteo.com:
      /v1/forecast: 1800
    api.the-odds-api.com:
      /v4/odds: 300
    disable_on_429_seconds:
      api-football-v1.p.rapidapi.com:
        /v3/injuries: 900
      v3.football.api-sports.io:
        /v3/injuries: 900
    v3.football.api-sports.io:
      /v3/injuries: 86400
  disable_on_429_seconds:
    api-football-v1.p.rapidapi.com:
      /v3/injuries: 2
  football:
    backup_csv: https://www.kaggle.com/datasets/hugomathien/soccer
    features:
    - match_results
    - team_stats
    - player_stats
    - injuries
    - fixtures
    primary_api: https://www.football-data.org/
    secondary_api: https://www.api-football.com/
  general:
    odds_snapshot: https://the-odds-api.com/
    schedules: https://www.sportsradar.com/
    weather: https://open-meteo.com/
  odds:
    base_url: https://api.the-odds-api.com/v4
    cache_ttl: 900
    default_market: h2h
    default_sport: soccer
    env_key: ODDS_API_KEY
    provider: the-odds-api
    region: uk
    sport_map:
      bundesliga: soccer_germany_bundesliga
      champions-league: soccer_uefa_champs_league
      europa-league: soccer_uefa_europa_league
      la-liga: soccer_spain_la_liga
      ligue-1: soccer_france_ligue_one
      premier-league: soccer_epl
      serie-a: soccer_italy_serie_a
  throttle_bucket_by_endpoint:
    api.football-data.org:
      /v4/teams/:
        capacity: 5
        rate: 0.5
    v3.football.api-sports.io:
      /fixtures:
        capacity: 8
        rate: 0.8
  throttle_bucket_by_host:
    api-football-v1.p.rapidapi.com:
      capacity: 8
      rate: 0.8
    api.football-data.org:
      capacity: 10
      rate: 0.6
    api.sportsdata.io:
      capacity: 10
      rate: 1.0
    api.the-odds-api.com:
      capacity: 10
      rate: 1.0
  throttle_by_endpoint:
    api-football-v1.p.rapidapi.com:
      /v3/fixtures: 1.5
      /v3/teams: 1.5
    api.football-data.org:
      /v4/competitions/: 1.5
      /v4/matches/: 1.5
      /v4/teams/: 2.0
    v3.football.api-sports.io:
      /v3/fixtures: 1.5
      /v3/injuries: 10.0
      /v3/teams: 1.5
  throttle_by_host:
    api-football-v1.p.rapidapi.com: 1.2
    api.football-data.org: 6.0
    api.sportsdata.io: 1.0
    api.the-odds-api.com: 1.0
database:
  path: data/sports_predictions.db
  type: sqlite
environment: dev
features:
  advanced_stats:
    basketball:
    - pace
    - offensive_rating
    - defensive_rating
    - player_efficiency_rating
    football:
    - expected_goals
    - possession
    - shots_on_target
    - passing_accuracy
  home_away_advantage:
    adjustment_factor: 0.1
    enabled: true
  player_availability:
    injury_weight: 0.8
    suspension_weight: 0.9
  team_form:
    rolling_window: 10
    weights: exponential
general:
  language_default: en
  language_supported:
  - en
  - es
  random_seed: 42
  timezone_display: Europe/Madrid
  timezone_storage: UTC
logging:
  correlation_ids: true
  format: json
  level: INFO
  location: logs/
models:
  bayesian:
    enabled: true
    prior_type: normal
  elo:
    enabled: true
    home_advantage: 100
    k_factor: 20
  ensemble:
    enabled: true
    models:
    - elo
    - poisson
    - gradient_boosting
    weights_auto: true
  gradient_boosting:
    early_stopping_rounds: 100
    enabled: true
    library: lightgbm
    n_estimators: 1000
  neural_network:
    architecture: lstm
    enabled: false
    hidden_size: 128
  poisson:
    enabled: true
    max_goals: 10
monitoring:
  health_checks:
    alert_webhook: null
    pipeline_heartbeat: true
  model_drift:
    metrics:
    - psi
    - ks_test
    thresholds:
      psi_critical: 0.25
      psi_warning: 0.1
reporting:
  calibration_visuals:
    include_brier_breakdown: true
    include_reliability_diagram: true
  filenames:
    pattern: reports/{league}_{date}_{model_version}.{ext}
  localization:
    enabled: true
    languages:
    - en
    - es
  png_style:
    dpi: 200
    font_family: Inter
    margin: 16
    palette: okabe_ito
reproducibility:
  data_snapshots:
    enabled: true
    path: data/snapshots
    policy: immutable_per_training_run
  lineage:
    model_versioning: semantic
    track_hashes:
    - data_hash
    - code_hash
    - params_hash
security:
  run_as_non_root: true
  secrets_from_env: true
