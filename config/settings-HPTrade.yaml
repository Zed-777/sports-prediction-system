# SportsPredictionSystem Configuration

# Environment settings
environment: dev  # dev, staging, prod

# General settings
general:
  timezone_storage: UTC
  timezone_display: Europe/Madrid
  language_default: en
  language_supported:
    - en
    - es
  random_seed: 42

# Data source configuration
data_sources:
  football:
    primary_api: "https://www.football-data.org/"
    secondary_api: "https://www.api-football.com/"
    backup_csv: "https://www.kaggle.com/datasets/hugomathien/soccer"
    features:
      - match_results
      - team_stats
      - player_stats
      - injuries
      - fixtures
    
  basketball:
    primary_api: "https://www.balldontlie.io/"
    secondary_api: "https://sportsdata.io/developers/api-documentation/nba"
    backup_csv: "https://www.kaggle.com/datasets/nathanlauga/nba-games"
    features:
      - match_results
      - team_stats
      - player_stats
      - injuries
      - fixtures
  
  general:
    schedules: "https://www.sportsradar.com/"
    weather: "https://open-meteo.com/"
    odds_snapshot: "https://the-odds-api.com/"

# Data engineering settings
data_engineering:
  retry_policy:
    max_attempts: 5
    backoff_strategy: exponential
    jitter: true
  
  fallbacks:
    order:
      - primary_api
      - secondary_api
      - backup_csv
  
  caching:
    enabled: true
    ttl_seconds: 3600
    store: disk

# Model configuration
models:
  elo:
    enabled: true
    k_factor: 20
    home_advantage: 100
  
  poisson:
    enabled: true
    max_goals: 10
  
  gradient_boosting:
    enabled: true
    library: lightgbm
    n_estimators: 1000
    early_stopping_rounds: 100
  
  bayesian:
    enabled: true
    prior_type: normal
  
  neural_network:
    enabled: false
    architecture: lstm
    hidden_size: 128
  
  ensemble:
    enabled: true
    weights_auto: true
    models:
      - elo
      - poisson
      - gradient_boosting

# Feature engineering
features:
  team_form:
    rolling_window: 10
    weights: exponential
  
  player_availability:
    injury_weight: 0.8
    suspension_weight: 0.9
  
  home_away_advantage:
    enabled: true
    adjustment_factor: 0.1
  
  advanced_stats:
    football:
      - expected_goals
      - possession
      - shots_on_target
      - passing_accuracy
    basketball:
      - pace
      - offensive_rating
      - defensive_rating
      - player_efficiency_rating

# Monitoring and alerting
monitoring:
  health_checks:
    pipeline_heartbeat: true
    alert_webhook: null  # set in environment
  
  model_drift:
    metrics:
      - psi
      - ks_test
    thresholds:
      psi_warning: 0.1
      psi_critical: 0.25

# Reporting configuration
reporting:
  png_style:
    palette: okabe_ito
    font_family: Inter
    dpi: 200
    margin: 16
  
  filenames:
    pattern: "reports/{league}_{date}_{model_version}.{ext}"
  
  calibration_visuals:
    include_reliability_diagram: true
    include_brier_breakdown: true
  
  localization:
    enabled: true
    languages:
      - en
      - es

# Database settings
database:
  type: sqlite  # sqlite or postgres
  path: "data/sports_predictions.db"  # for sqlite
  # For postgres, use environment variables

# Logging
logging:
  level: INFO
  format: json
  location: logs/
  correlation_ids: true

# Security
security:
  run_as_non_root: true
  secrets_from_env: true

# Reproducibility
reproducibility:
  data_snapshots:
    enabled: true
    path: data/snapshots
    policy: immutable_per_training_run
  
  lineage:
    model_versioning: semantic
    track_hashes:
      - data_hash
      - code_hash
      - params_hash