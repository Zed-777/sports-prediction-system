name: Fetch Results and Optimize

on:
  schedule:
    - cron: '0 3 * * *'  # Runs daily at 03:00 UTC
  workflow_dispatch:

jobs:
  fetch-and-optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch results
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python scripts/collect_historical_results.py --fetch-all --auto-optimize 50 --notify || true

      - name: Update prediction results (PredictionTracker CC-002)
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          SKIP_INJURIES: '1'
        run: |
          python scripts/update_prediction_results.py --days-back 14 --verbose || true

      - name: Backfill provider IDs
        run: |
          python scripts/collect_historical_results.py --backfill-provider-ids --debug || true

      - name: Regenerate recent reports (prune + regen)
        run: |
          python scripts/regenerate_reports.py --all --count 5 --delay 60 --prune-keep 0 --debug || true

      - name: Commit updated historical files and reports
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/historical/*.json reports/leagues/** || true
          git commit -m 'ci: update historical results and regenerated reports (automated)' || true
          git push || true
