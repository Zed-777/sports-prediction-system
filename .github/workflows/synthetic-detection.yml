name: Synthetic Detection & Publication Gate Tests

on:
  push:
    branches: [ main, master, feature/** ]
  pull_request:
  schedule:
    - cron: '0 3 * * *'  # daily at 03:00 UTC

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: [3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run synthetic tests
        run: |
          python -m pytest -q tests/test_publication_gate.py tests/test_synthetic_report_handling.py tests/test_flashscore_debug.py
      - name: Run synthetic audit script
        run: |
          python scripts/audit_synthetic_reports.py --days 7 --out reports/metrics/simulated_ci_summary.json
      - name: Upload synthetic summary
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-summary
          path: reports/metrics/simulated_ci_summary.json
      - name: Alert if synthetic reports exceed threshold
        uses: actions/github-script@v8
        env:
          SYNTHETIC_ALERT_THRESHOLD: 0
          SYNTHETIC_ALERT_FRACTION: 0.10
        with:
          script: |
            const fs = require('fs')
            const path = 'reports/metrics/simulated_ci_summary.json'
            if (!fs.existsSync(path)) {
              core.info('No synthetic summary found; skipping alert')
              return
            }
            const data = JSON.parse(fs.readFileSync(path, 'utf8'))
            const countThreshold = parseInt(process.env.SYNTHETIC_ALERT_THRESHOLD || '0', 10)
            const fractionThreshold = parseFloat(process.env.SYNTHETIC_ALERT_FRACTION || '0')
            const total = data.total || 0
            const frac = data.synthetic_fraction || 0
            if (total > countThreshold || frac > fractionThreshold) {
              const body = `Automated audit detected **${total}** synthetic reports across leagues (fraction ${frac.toFixed(2)}).\n\n**By league:**\n${Object.entries(data.by_league).map(([l,c])=>`- ${l}: ${c}`).join('\n')}\n\n**Samples:**\n${(data.samples||[]).slice(0,10).join('\n')}`
              await github.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Synthetic reports detected: ${total} total (fraction ${frac.toFixed(2)})`,
                body: body,
              })
            } else {
              core.info(`No synthetic alert: ${total} <= ${countThreshold} and fraction ${frac.toFixed(2)} <= ${fractionThreshold}`)
            }
