# Secret Scanning CI (TODO #64)
# Runs detect-secrets on every push / PR to catch accidentally committed API keys,
# tokens, passwords, and other sensitive strings.
#
# False-positives (test fixtures, dummy CI values) are suppressed via .secrets.baseline.
# To update the baseline after a deliberate allowlisted change, run locally:
#   python -m detect_secrets scan > .secrets.baseline
#   git add .secrets.baseline && git commit -m "chore: update secrets baseline"

name: Secret Scanning

on:
  push:
    branches: [main, master, "feature/**", "fix/**"]
  pull_request:
    branches: [main, master]

jobs:
  detect-secrets:
    name: detect-secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so pre-push hooks work correctly

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Run secret scan (baseline audit)
        # detect-secrets audit exits non-zero when NEW secrets are found that
        # are not in .secrets.baseline. The baseline captures accepted
        # false-positives (see .secrets.baseline in repo root).
        run: |
          python -m detect_secrets scan \
            --exclude-files 'data/.*|models/.*|reports/.*|archive/.*|secrets/.*|\.venv/.*' \
            --baseline .secrets.baseline
        # diff the fresh scan against the committed baseline
      - name: Diff against baseline (fail on NEW findings)
        run: |
          python -m detect_secrets scan \
            --exclude-files 'data/.*|models/.*|reports/.*|archive/.*|secrets/.*|\.venv/.*' \
            > /tmp/current_scan.json
          # Use Python to compare; exit 1 if any result files differ
          python - <<'PY'
          import json, sys

          def load(path):
              with open(path) as f:
                  return json.load(f)

          baseline = load(".secrets.baseline")
          current  = load("/tmp/current_scan.json")

          known = {
              f: {s["hashed_secret"] for s in secrets}
              for f, secrets in baseline.get("results", {}).items()
          }
          new_findings = []
          for f, secrets in current.get("results", {}).items():
              for s in secrets:
                  if s["hashed_secret"] not in known.get(f, set()):
                      new_findings.append({"file": f, "line": s.get("line_number"), "type": s.get("type")})

          if new_findings:
              print("❌ NEW potential secrets found (not in baseline):")
              for nf in new_findings:
                  print(f"  {nf['file']}:{nf['line']} [{nf['type']}]")
              print()
              print("If this is a false-positive, run:")
              print("  python -m detect_secrets scan > .secrets.baseline")
              print("  git add .secrets.baseline && git commit -m 'chore: update secrets baseline'")
              sys.exit(1)
          else:
              print("✅ No new secrets found.")
          PY

      - name: Check .env files are not committed
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "❌ .env file is committed!  Remove it: git rm --cached .env"
            exit 1
          fi
          echo "✅ .env is not committed."

      - name: Check for hard-coded placeholder keys
        # Catch common patterns of keys accidentally left in scripts
        run: |
          if grep -r "sk-[a-zA-Z0-9]\{32\}" --include="*.py" .; then
            echo "❌ Possible OpenAI key found"; exit 1
          fi
          if grep -r "AAAA[a-zA-Z0-9+/]\{32,\}" --include="*.py" .; then
            echo "❌ Possible base64-encoded token found"; exit 1
          fi
          echo "✅ No obvious hard-coded key patterns."
