# CI workflow - lint + tests
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy --ignore-missing-imports .

      - name: Run tests
        run: python -m pytest -q

  smoke:
    runs-on: ubuntu-latest
    needs: lint-test
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Mambaforge
          python-version: 3.11
          activate-environment: sps_py311
          auto-activate-base: false

      - name: Install dependencies
        run: |
          mamba install -n sps_py311 -c conda-forge pip
          mamba run -n sps_py311 pip install -r requirements.txt
          mamba run -n sps_py311 pip install -r requirements_phase2_fixed.txt || true
          mamba run -n sps_py311 pip install -e .
      - name: Install dev dependencies
        run: mamba run -n sps_py311 pip install -r requirements-dev.txt
      - name: Install project package editable
        run: mamba run -n sps_py311 pip install -e .

      - name: Run tests (including fakeredis)
        env:
          REDIS_URL: redis://localhost:6379
        run: |
          mamba run -n sps_py311 pytest -q

      - name: Run generator smoke test (export metrics)
        env:
          REDIS_URL: redis://localhost:6379
        run: mamba run -n sps_py311 python generate_fast_reports.py generate 1 matches for la-liga --export-metrics

      - name: Archive reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/
      - name: List metric artifacts
        if: always()
        run: |
          echo "Metric files in reports/metrics:"; ls -la reports/metrics || true
