name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Mambaforge
          python-version: 3.11
          activate-environment: sps_py311
          environment-file: ''
          auto-activate-base: false

      - name: Install dependencies
        run: |
          mamba install -n sps_py311 -c conda-forge pip
          pip install -r requirements.txt
          pip install -r requirements_phase2_fixed.txt || true

      - name: Run tests
        run: |
          pytest -q

      - name: Run generator smoke test
        run: |
          python generate_fast_reports.py generate 1 matches for la-liga

      - name: Archive reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/
